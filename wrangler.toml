# Cloudflare Pages — HomeSystemBuilder
#
# This app uses Next.js `output: "export"` → static files in `out/` (includes `index.html` for `/`).
# Do NOT set the output directory to `.next` — that folder is not a deployable static root.
#
# Dashboard: Build command = npm run build
#             Build output directory = out
#
# CLI: npx wrangler pages deploy out --project-name=homesystembuilder

name = "homesystembuilder"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "out"
